{% extends "base.html" %}

{% block title %}Employees - Employee Portal{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <span class="text-uppercase text-primary small fw-bold">Directory</span>
        <h1>Employees</h1>
        <p>Search the company directory by employee name, department, position, or email.</p>
    </div>
</div>

<section class="portal-card mb-4">
    <form class="row g-3 align-items-center" method="get">
        <div class="col-lg">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input
                    class="form-control"
                    type="search"
                    name="q"
                    value="{{ search_term }}"
                    placeholder="Search by name, department, position, or email"
                >
            </div>
        </div>
        <div class="col-lg-auto">
            <button class="btn btn-primary w-100" type="submit">Search directory</button>
        </div>
    </form>
</section>

{% include "portal/_employee_directory.html" %}
{% endblock %}
